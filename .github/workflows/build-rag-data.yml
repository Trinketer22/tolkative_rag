name: Test, build, and release RAG data

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r requirements.txt --extra-index-url https://download.pytorch.org/whl/cpu -e ".[test]"

      - name: Run tests
        run: pytest

  build-rag-data:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt --extra-index-url https://download.pytorch.org/whl/cpu -e .

      - name: Build docs and snippets dumps
        run: python scripts/prepare_data.py

      - name: Upload RAG data artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rag-data-dumps
          path: |
            rag-data/docs.jsonl
            rag-data/latest_snippets.jsonl
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: [test, build-rag-data]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt --extra-index-url https://download.pytorch.org/whl/cpu -e .

      - name: Build docs and snippets dumps
        run: python scripts/prepare_data.py

      - name: Attach artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rag-data/docs.jsonl
            rag-data/latest_snippets.jsonl
